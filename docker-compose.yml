services: # Collection of containers that compose the application

  frontend: # Vue/Vite frontend container

    build:
      context: ./frontend # Dockerfile and build files are located in ./frontend

    environment:
      - NPM_CONFIG_CACHE=/root/.npm
      - CHOKIDAR_USEPOLLING=true # Force vite hot-reload
      - WATCHPACK_POLLING=true # Force vite hot-reload

    volumes:
      # Bind mount:
      # Changes made locally are immediately visible inside the container,
      # enabling hot reload during development.
      - ./frontend:/workspace
      - /workspace/node_modules
      - npm_cache:/root/.npm

    ports:
      # Port mapping format:
      # <host_port>:<container_port>
      #
      # Accessing http://localhost:5173 on the host forwards
      # traffic to port 5173 inside the container.
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:5173:5173"

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  npm_cache: